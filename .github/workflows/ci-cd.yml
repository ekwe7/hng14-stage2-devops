name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: localhost:5000
  REDIS_PASSWORD: testsecret

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        run: |
          docker run --rm -v $PWD:/work hadolint/hadolint:latest-alpine /work/api/Dockerfile
          docker run --rm -v $PWD:/work hadolint/hadolint:latest-alpine /work/worker/Dockerfile
          docker run --rm -v $PWD:/work hadolint/hadolint:latest-alpine /work/frontend/Dockerfile
      - name: flake8 (Python)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=120 --ignore=E501
      - name: eslint (JavaScript)
        run: |
          cd frontend
          npm install eslint
          npx eslint . --ext .js

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov fakeredis httpx
          pip install -r api/requirements.txt
      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest api/tests/ --cov=api --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start local Docker registry
        run: docker run -d -p 5000:5000 --name registry registry:2
      - name: Build and tag images
        run: |
          docker build -t $REGISTRY/api:${GITHUB_SHA} -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:${GITHUB_SHA} -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:${GITHUB_SHA} -t $REGISTRY/frontend:latest ./frontend
      - name: Push images to local registry
        run: |
          docker push $REGISTRY/api --all-tags
          docker push $REGISTRY/worker --all-tags
          docker push $REGISTRY/frontend --all-tags

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/trivy.pub | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt update && sudo apt install -y trivy
      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/api:latest
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/worker:latest
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/frontend:latest
      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: ./*.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Create docker-compose.ci.yml
        run: |
          cat > docker-compose.ci.yml << 'INNER'
          services:
            redis:
              image: redis:alpine
              command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
              healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 3}
              networks: [internal]
            api:
              image: localhost:5000/api:latest
              environment:
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
              depends_on: {redis: {condition: service_healthy}}
              networks: [internal]
              ports: ["8000:8000"]
            worker:
              image: localhost:5000/worker:latest
              environment:
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
              depends_on: {redis: {condition: service_healthy}}
              networks: [internal]
            frontend:
              image: localhost:5000/frontend:latest
              environment: {API_URL: "http://api:8000"}
              depends_on: {api: {condition: service_healthy}}
              networks: [internal]
              ports: ["3000:3000"]
          networks: {internal: {driver: bridge}}
          INNER
      - name: Start stack
        run: docker compose -f docker-compose.ci.yml up -d
      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health && curl -f http://localhost:3000/health; then
              break
            fi
            sleep 2
          done
      - name: Integration test – submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete within timeout"
          exit 1
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Rolling update simulation
        run: |
          for service in api worker frontend; do
            docker compose pull $service
            docker compose up -d --no-deps $service
            for i in {1..60}; do
              if docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-${service}-1 2>/dev/null | grep -q healthy; then
                echo "$service is healthy"
                break
              fi
              sleep 1
            done
            if ! docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-${service}-1 2>/dev/null | grep -q healthy; then
              echo "Health check failed for $service – aborting"
              exit 1
            fi
          done
