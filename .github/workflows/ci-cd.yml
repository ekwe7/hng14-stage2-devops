name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: localhost:5000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint api/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error
      - name: Lint worker/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error
      - name: Lint frontend/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error
      - name: flake8 (Python)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=120 --ignore=E501
      - name: eslint (JavaScript)
        run: |
          cd frontend
          npm install eslint
          npx eslint . --ext .js

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov fakeredis httpx
          pip install -r api/requirements.txt
      - name: Run unit tests with coverage
        run: |
          python -m pytest api/tests/ --cov=api --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start local Docker registry
        run: docker run -d -p 5000:5000 --name registry registry:2
      - name: Build and tag images (SHA + latest)
        run: |
          docker build -t $REGISTRY/api:${GITHUB_SHA} -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:${GITHUB_SHA} -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:${GITHUB_SHA} -t $REGISTRY/frontend:latest ./frontend
      - name: Push images to local registry
        run: |
          docker push $REGISTRY/api --all-tags
          docker push $REGISTRY/worker --all-tags
          docker push $REGISTRY/frontend --all-tags

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/trivy.pub | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt update && sudo apt install -y trivy
      - name: Scan images (fail on CRITICAL)
        run: |
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/api:latest
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/worker:latest
          trivy image --severity CRITICAL --exit-code 1 $REGISTRY/frontend:latest
      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: ./*.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Create docker-compose.ci.yml
        run: |
          printf 'services:\n' > docker-compose.ci.yml
          printf '  redis:\n' >> docker-compose.ci.yml
          printf '    image: redis:alpine\n' >> docker-compose.ci.yml
          printf '    command: redis-server --requirepass ${REDIS_PASSWORD}\n' >> docker-compose.ci.yml
          printf '    healthcheck:\n' >> docker-compose.ci.yml
          printf '      test: ["CMD", "redis-cli", "ping"]\n' >> docker-compose.ci.yml
          printf '      interval: 5s\n' >> docker-compose.ci.yml
          printf '      timeout: 3s\n' >> docker-compose.ci.yml
          printf '      retries: 3\n' >> docker-compose.ci.yml
          printf '    networks: [internal]\n' >> docker-compose.ci.yml
          printf '  api:\n' >> docker-compose.ci.yml
          printf '    image: localhost:5000/api:latest\n' >> docker-compose.ci.yml
          printf '    environment:\n' >> docker-compose.ci.yml
          printf '      REDIS_HOST: redis\n' >> docker-compose.ci.yml
          printf '      REDIS_PORT: 6379\n' >> docker-compose.ci.yml
          printf '      REDIS_PASSWORD: ${REDIS_PASSWORD}\n' >> docker-compose.ci.yml
          printf '    depends_on:\n' >> docker-compose.ci.yml
          printf '      redis:\n' >> docker-compose.ci.yml
          printf '        condition: service_healthy\n' >> docker-compose.ci.yml
          printf '    networks: [internal]\n' >> docker-compose.ci.yml
          printf '    ports:\n' >> docker-compose.ci.yml
          printf '      - "8000:8000"\n' >> docker-compose.ci.yml
          printf '  worker:\n' >> docker-compose.ci.yml
          printf '    image: localhost:5000/worker:latest\n' >> docker-compose.ci.yml
          printf '    environment:\n' >> docker-compose.ci.yml
          printf '      REDIS_HOST: redis\n' >> docker-compose.ci.yml
          printf '      REDIS_PORT: 6379\n' >> docker-compose.ci.yml
          printf '      REDIS_PASSWORD: ${REDIS_PASSWORD}\n' >> docker-compose.ci.yml
          printf '    depends_on:\n' >> docker-compose.ci.yml
          printf '      redis:\n' >> docker-compose.ci.yml
          printf '        condition: service_healthy\n' >> docker-compose.ci.yml
          printf '    networks: [internal]\n' >> docker-compose.ci.yml
          printf '  frontend:\n' >> docker-compose.ci.yml
          printf '    image: localhost:5000/frontend:latest\n' >> docker-compose.ci.yml
          printf '    environment:\n' >> docker-compose.ci.yml
          printf '      API_URL: "http://api:8000"\n' >> docker-compose.ci.yml
          printf '    depends_on:\n' >> docker-compose.ci.yml
          printf '      api:\n' >> docker-compose.ci.yml
          printf '        condition: service_healthy\n' >> docker-compose.ci.yml
          printf '    networks: [internal]\n' >> docker-compose.ci.yml
          printf '    ports:\n' >> docker-compose.ci.yml
          printf '      - "3000:3000"\n' >> docker-compose.ci.yml
          printf 'networks:\n' >> docker-compose.ci.yml
          printf '  internal:\n' >> docker-compose.ci.yml
          printf '    driver: bridge\n' >> docker-compose.ci.yml
      - name: Start stack
        run: docker compose -f docker-compose.ci.yml up -d
      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health && curl -f http://localhost:3000/health; then
              echo "Services are healthy"
              break
            fi
            sleep 2
          done
      - name: Run integration test script
        run: ./integration_test.sh
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Rolling update simulation
        run: |
          for service in api worker frontend; do
            docker compose pull $service
            docker compose up -d --no-deps $service
            for i in {1..60}; do
              if docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-${service}-1 2>/dev/null | grep -q healthy; then
                echo "$service is healthy"
                break
              fi
              sleep 1
            done
            if ! docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-${service}-1 2>/dev/null | grep -q healthy; then
              echo "Health check failed for $service – aborting"
              exit 1
            fi
          done
